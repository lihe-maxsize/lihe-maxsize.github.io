sections:
  short_bio: |
    I am currently a Ph.D. student in the [Department of Computer Science](https://www.comp.hkbu.edu.hk/v1/) at [Hong Kong Baptist University (HKBU)](https://www.hkbu.edu.hk/), advised by Prof. [Bo Han](https://scholar.google.cz/citations?user=nTNjqHwAAAAJ&hl=zh-CN). 
    I also work in close collaboration with Dr. [Haoang Chi](https://scholar.google.cz/citations?user=q0dsTq4AAAAJ&hl=zh-CN). 
    My research focuses on advancing artificial intelligence through causality, with specific interests in:
    - Causal World Models
    - Causal Spatial Intelligence
    - Causal Reasoning in Multimodal Large Language Models

